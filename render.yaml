services:
  - type: web
    name: boutique
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/boutique.db
      - key: UPLOADS_DIR
        value: /var/data/uploads
      - key: BASE_URL
        sync: false
      - key: MPESA_CALLBACK_URL
        sync: false
      - key: MPESA_ENV
        value: sandbox
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
    disk:
      name: boutique-data
      mountPath: /var/data
      sizeGB: 1
